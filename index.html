<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PB Academy — Go-to-Market Strategy</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-white font-sans antialiased overflow-hidden selection:bg-zinc-700 selection:text-white">
    
    <!-- Top Progress Bar -->
    <div class="fixed top-0 left-0 h-1.5 bg-zinc-900 w-full z-50">
        <div id="progress-bar" class="h-full bg-white transition-all duration-500 ease-out w-0 shadow-[0_0_10px_rgba(255,255,255,0.5)]"></div>
    </div>

    <!-- Navigation Dots (Right side) -->
    <div class="fixed right-6 top-1/2 transform -translate-y-1/2 z-50 flex flex-col gap-3" id="nav-dots">
        <!-- Dots injected by JS -->
    </div>

    <!-- Main Slides Container -->
    <main id="slides-container" class="h-screen w-full relative">
        <!-- Slides injected by JS -->
    </main>

    <!-- Fallback message for local file:// access -->
    <div id="cors-warning" class="hidden fixed bottom-4 left-4 right-4 bg-red-900/90 border border-red-500 text-white p-4 rounded-xl z-50 text-center text-sm shadow-xl">
        <p><strong>Note:</strong> To view this presentation properly, you need to run it through a local web server (like VS Code's Live Server) due to browser security restrictions on loading local files.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
